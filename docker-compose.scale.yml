# Horizontal scale overlay — adds API-only clawbot PEER(s) to the base stack
# and wires the primary to them via CLAWBOT_PEERS + the lightest-idle load
# balancer that's already in the server.
#
#   docker compose -f docker-compose.yml -f docker-compose.scale.yml up --build
#   docker compose -f docker-compose.yml -f docker-compose.scale.yml up --scale neuroworks-peer=2
#
# ── READ THIS FIRST ───────────────────────────────────────────────────────
# Extra replicas only add THROUGHPUT if their inference doesn't bottleneck on
# the SAME model. Two failure modes to avoid:
#   • All peers point at one local Ollama → they serialise behind that model;
#     you've added orchestration overhead for ~zero gain. Fix: OLLAMA_NUM_PARALLEL
#     on the Ollama host, or a shared PAID OpenRouter tier, or one Ollama per host.
#   • All peers on ONE physical host → they share that host's CPU/RAM/GPU.
#     Real scale = each peer on a DIFFERENT host. On separate hosts, the vault
#     should sync via the GitHub vault repo (VAULT_REPO), NOT a shared volume;
#     give each host its own state volume. This single-host overlay mainly
#     proves the peer WIRING — it is not where the throughput win comes from.
#
# So: solve inference first (Option 2), then scale out across hosts (this file).

services:
  # Primary learns about the peer(s). The server also auto-discovers localhost
  # peers every 60s, but across containers we name it explicitly.
  neuroworks:
    environment:
      CLAWBOT_PEERS: http://neuroworks-peer:7471
      # Containers reach the HOST's Ollama via host.docker.internal. Override in
      # .env to point at a shared/remote LLM instead.
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # API-only clawbot peer (no web UI). Same image, server-only command, its own
  # state volume so the two don't fight over the jobs journal / executor.json.
  # Shares the vault volume on a single host (mirrors today's multi-worker model);
  # for multi-HOST, drop the shared vault and let VAULT_REPO sync instead.
  neuroworks-peer:
    image: neuroworks:local
    build: .
    restart: unless-stopped
    command: ["pnpm", "-F", "clawbot-server", "start"]
    environment:
      VAULT_PATH: /data/vault
      NEUROWORKS_PORT: "7471"
      CLAWBOT_NAME: peer
      CLAWBOT_ROLE: persona-shifter
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - path: .env
        required: false
    volumes:
      - neuroworks_peer_state:/app/.neuroworks
      - neuroworks_vault:/data/vault

volumes:
  neuroworks_peer_state:
    name: clawbot_neuroworks_peer_state
