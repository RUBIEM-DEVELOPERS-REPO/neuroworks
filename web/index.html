<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Type system (2026-07-12 readability pass): Inter carries body copy
         (already one of the most legible UI faces going, kept); Plus Jakarta
         Sans replaced Space Grotesk for display/headings — warmer, rounder
         terminals, reads as approachable rather than crypto/tech-startup.
         JetBrains Mono is kept ONLY for genuine monospace contexts (code
         blocks, tabular numbers in cost/data tables — 200+ real uses across
         the app) — no longer used for eyebrow/label text, which was the
         biggest "terminal UI" signal in the old system. -->
    <!-- Display face = Playfair Display (transitional serif, variable
         wght@400..900) for a sleeker, more editorial/luxury feel on headings
         and the wordmark. Plus Jakarta Sans is kept as a variable range
         (wght@200..800) because DynamicWeightText / WeightHoverText animate
         font-variation-settings live on it and the particle wordmark samples
         its glyphs. Inter carries body copy; JetBrains Mono for code/tabular
         numbers. -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@200..800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet" />
    <title>NeuroWorks · The AI Workforce</title>
  </head>
  <body class="bg-ink-950 text-cream-100">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
