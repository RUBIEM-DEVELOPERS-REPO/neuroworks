# TEMPLATE ONLY — do not `kubectl apply -f` this file with real values filled
# in and do not commit it filled in. Copy it, fill it, apply the copy, then
# throw the copy away (or keep it out of git entirely — add it to .gitignore
# the moment you create it). Prefer:
#
#   kubectl create secret generic neuroworks-secrets -n neuroworks \
#     --from-literal=NEUROWORKS_SECRET_KEY="$(openssl rand -hex 32)" \
#     --from-literal=GITHUB_TOKEN=ghp_your_token \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# which never writes the plaintext to a file at all.
#
# NEUROWORKS_SECRET_KEY — NOT optional here, unlike a single local instance.
# server/src/lib/secret-box.ts auto-generates a random key and persists it to
# .neuroworks/.secret-key IF THIS IS UNSET. Each pod has its OWN state
# volume — if you don't set this explicitly, the primary and every peer would
# each generate a DIFFERENT random key, and any pod recreated onto a fresh
# PVC (a node failure, a manual scale-down/up, a StatefulSet rebuild) gets
# yet another one. Anything encrypted under an old key (integration tokens,
# DB connection strings in data-sources.json) becomes permanently
# undecryptable the moment that happens. Generate ONE key
# (openssl rand -hex 32) and set it here — every pod shares it.
apiVersion: v1
kind: Secret
metadata:
  name: neuroworks-secrets
  namespace: neuroworks
type: Opaque
stringData:
  # Required for the vault git sync (pull on every pod, push from primary).
  # Same scope as documented in .env.example: Contents r/w on the vault repo.
  GITHUB_TOKEN: "CHANGEME"
  # Required — see the comment above. Generate with: openssl rand -hex 32
  NEUROWORKS_SECRET_KEY: "CHANGEME"

  # --- Everything below is optional, exactly like .env.example. Delete any
  # line you don't need rather than leaving a blank CHANGEME the app will try
  # to use. ---

  # Cloud LLM escalation (skip if OLLAMA_HOST alone is enough for your load).
  # OPENROUTER_API_KEY: "CHANGEME"
  # ANTHROPIC_SMALL_MODEL: "claude-haiku-4-5"
  # ANTHROPIC_LARGE_MODEL: "claude-sonnet-5"

  # Outbound email (Mailjet HTTPS API — no SMTP creds needed).
  # NEUROWORKS_MAILJET_API_KEY: "CHANGEME"
  # NEUROWORKS_MAILJET_API_SECRET: "CHANGEME"

  # Payments.
  # STRIPE_SECRET_KEY: "CHANGEME"
  # STRIPE_WEBHOOK_SECRET: "CHANGEME"
  # PAYNOW_INTEGRATION_ID: "CHANGEME"
  # PAYNOW_INTEGRATION_KEY: "CHANGEME"

  # External agent-dispatch webhook signing.
  # NW_WEBHOOK_SIGNING_SECRET: "CHANGEME"
