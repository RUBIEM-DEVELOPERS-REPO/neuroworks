# API-only execution capacity the primary delegates work to (lib/peers.ts).
# No SERVE_WEB, no web UI, never targeted by an Ingress or external Service —
# reached only by the primary, over the headless Service below. Headless
# (clusterIP: None) so each pod gets a stable, individually-addressable DNS
# name (neuroworks-peer-0.neuroworks-peer…, -1, -2…) — the primary's
# NEUROWORKS_PEERS list in 03-primary.yaml depends on these exact names.
#
# Mirrors docker-compose.scale.yml's own warning: extra peer pods only add
# throughput if inference doesn't bottleneck on one shared Ollama. Confirm
# OLLAMA_HOST actually scales (multiple Ollama replicas, OLLAMA_NUM_PARALLEL,
# or cloud escalation) before assuming more peer replicas = more throughput.
apiVersion: v1
kind: Service
metadata:
  name: neuroworks-peer
  namespace: neuroworks
  labels:
    app: neuroworks
    role: peer
spec:
  clusterIP: None
  selector:
    app: neuroworks
    role: peer
  ports:
    - port: 7471
      targetPort: 7471
      name: http
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: neuroworks-peer
  namespace: neuroworks
  labels:
    app: neuroworks
    role: peer
spec:
  serviceName: neuroworks-peer
  # 5 peers + 1 primary = 6 pods (the "3-5 always running, for scale" ask,
  # applied to the part of this app that's actually safe to scale — see the
  # top of 01-configmap.yaml for why the primary stays at 1). Static list,
  # not auto-discovered: if you change this number, update the primary's
  # NEUROWORKS_PEERS in 03-primary.yaml to match (peer-0..peer-4) and roll
  # it. Started this at 3 and validated end-to-end before bumping to 5 —
  # don't jump straight to 5 on a cluster you haven't tested this on yet.
  replicas: 5
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: neuroworks
      role: peer
  template:
    metadata:
      labels:
        app: neuroworks
        role: peer
    spec:
      securityContext:
        runAsNonRoot: true
      # Stability: prefer spreading peer pods across different nodes so one
      # node going down doesn't take out the whole execution pool at once.
      # Soft (preferred, not required) — on a small/single-node cluster this
      # just gets ignored rather than leaving pods unschedulable.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: neuroworks
                    role: peer
                topologyKey: kubernetes.io/hostname
      containers:
        - name: neuroworks
          image: neuroworks:latest   # same image as the primary — see 03-primary.yaml
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: neuroworks-config
            - secretRef:
                name: neuroworks-secrets
          env:
            - name: SERVE_WEB
              value: "0"
            - name: NEUROWORKS_ROLE
              value: "persona-shifter"
            # Stable, human-legible identity per pod (shows up in /api/health
            # and logs) — the StatefulSet pod name is already unique and
            # ordinal, so just reuse it via the downward API instead of a
            # wrapper script.
            - name: NEUROWORKS_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          ports:
            - containerPort: 7471
              name: http
          readinessProbe:
            httpGet: { path: /api/health, port: 7471 }
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet: { path: /api/health, port: 7471 }
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits: { cpu: "1", memory: "2Gi" }
          volumeMounts:
            - name: state
              mountPath: /app/.neuroworks
            - name: vault
              mountPath: /data/vault
  volumeClaimTemplates:
    - metadata:
        name: state
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests: { storage: 1Gi }
    - metadata:
        name: vault
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests: { storage: 5Gi }
---
# Stability: cap how many peers a voluntary disruption (node drain, cluster
# upgrade) can take down at once, so a rollout never drops the primary's
# entire delegation pool to zero mid-task. Doesn't apply to involuntary
# disruption (a node crashing) — that's what replicas: 5 + anti-affinity
# above are for.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: neuroworks-peer
  namespace: neuroworks
spec:
  minAvailable: 60%
  selector:
    matchLabels:
      app: neuroworks
      role: peer
